name: ai_tools_app
description: A mobile app with 50 AI tools using classical AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  syncfusion_flutter_charts: ^32.1.22
  syncfusion_flutter_gauges: ^32.1.22
  flutter:
    sdk: flutter

  firebase_core: ^4.3.0
  cloud_firestore: ^6.1.1
  firebase_auth: ^6.1.3
  google_sign_in: ^6.3.0


  # Image Processing
  image: ^4.1.4
  image_picker: ^1.0.4

  # Audio Processing
  audioplayers: ^6.5.1

  # State Management
  provider: ^6.1.1

  # Date & Formatting
  intl: ^0.20.2

  # File Handling
  file_picker: ^10.3.8
  path_provider: ^2.1.1
  path: ^1.9.0
  shared_preferences: ^2.2.2
  
  # Database & Permissions (NEW)
  # Removed sqlite packages in favor of lightweight SharedPreferences cache
  permission_handler: ^12.0.1

  # Forms & Input
  dropdown_button2: ^2.3.9
  flutter_typeahead: ^5.2.0

  # Connectivity (optional)
  connectivity_plus: ^7.0.0

  # CSV Handling
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  flutter_keyboard_visibility: 6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
